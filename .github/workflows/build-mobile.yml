name: Build Mobile (Android + iOS unsigned)

# Se déclenche à chaque push sur main, ou manuellement depuis l'onglet Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour pouvoir créer une Release

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest   # gratuit en minutes illimitées si le repo est PUBLIC
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # --no-codesign : pas de signature Apple, juste le build brut
      - run: flutter build ios --release --no-codesign

      # flutter produit un .app, AltStore a besoin d'un .ipa (= zip d'un dossier Payload/)
      - name: Empaqueter en .ipa
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app-release.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/iphoneos/app-release.ipa

  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Créer la Release GitHub avec les deux fichiers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: |
            app-release-apk/app-release.apk
            app-release-ipa/app-release.ipa