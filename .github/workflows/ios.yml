name: Build iOS (non signé)

# Compile un .ipa NON signé et le publie dans une Release GitHub à tag fixe
# (ios-latest) → URL stable pour altstore-source.json. À installer ensuite
# avec AltStore / Sideloadly (Apple ID gratuit, à refaire tous les 7 jours).

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # lancement manuel possible

permissions:
  contents: write   # requis pour créer/mettre à jour la Release

jobs:
  build-ios:
    # Ne se lance que si le message du commit contient [ios] ou [build]
    # (ou via "Run workflow" manuel).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[ios]') ||
      contains(github.event.head_commit.message, '[build]')
    # macOS requis pour la chaîne Apple. macos-15 = Sequoia (a Xcode 26).
    # Si Xcode 26 n'est pas trouvé, passe à "macos-26".
    runs-on: macos-15

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet + tags, requis pour les notes de version

      # .env est déclaré comme asset mais pas committé (secret/local).
      # On le recrée depuis le secret ENV_FILE, sinon vide (URLs par défaut).
      - name: Préparer le fichier .env
        env:
          ENV_FILE: ${{ secrets.MOBILE_ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > .env
          else
            touch .env
          fi

      # iOS 26 exige le SDK Xcode 26. latest-stable = le plus récent du runner.
      - name: Sélectionner Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      # Flutter 3.44 active SPM par défaut → conflit avec le Podfile CocoaPods.
      # On force CocoaPods (chemin attendu par le projet Xcode).
      - name: Forcer CocoaPods (désactiver Swift Package Manager)
        run: flutter config --no-enable-swift-package-manager

      # Repart d'un état Pods propre → Manifest.lock matchera Podfile.lock.
      - name: Nettoyer l'état Pods
        run: |
          flutter clean
          rm -f ios/Podfile.lock
          rm -rf ios/Pods

      - name: Récupérer les dépendances
        run: flutter pub get

      # Génère la config Xcode SANS lancer le build (évite le check "Development
      # Team" de Flutter sur les builds device).
      # --build-number = numéro de run CI → CFBundleVersion qui monte à chaque build.
      - name: Préparer la config Xcode
        run: flutter build ios --release --no-codesign --config-only --build-number=${{ github.run_number }}

      - name: Installer les pods
        run: |
          cd ios
          pod install

      # Build via xcodebuild avec la signature TOTALEMENT désactivée → aucune
      # équipe / profil requis. Sortie dans build/ios_out.
      - name: Build iOS non signé
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios_out \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            build

      # Le Runner.app produit est empaqueté en .ipa pour AltStore / Sideloadly.
      - name: Empaqueter en .ipa
        run: |
          cd build/ios_out/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -qq -r "$GITHUB_WORKSPACE/mkzik.ipa" Payload

      # Notes de version = commits feat/fix/style/refactor depuis le tag précédent.
      - name: Générer les notes de version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed -E 's/version: *([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          {
            echo "# Mkzik iOS v$VERSION (build ${{ github.run_number }})"
            echo
            bash scripts/release_notes.sh
          } > release_notes.md
          cat release_notes.md

      # Tag fixe "ios-latest" → l'URL de l'IPA ne change jamais.
      - name: Publier l'IPA dans une Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: "Mkzik iOS (dernier build)"
          body_path: release_notes.md
          files: mkzik.ipa
