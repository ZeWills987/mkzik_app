name: Build iOS (non signé)

# Compile un .ipa NON signé sur un runner macOS gratuit (repo public).
# À récupérer ensuite dans l'onglet "Actions" → artifact "mkzik-ipa",
# puis à signer/installer avec Sideloadly (Apple ID gratuit, 7 jours).

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # permet de lancer le build à la main

jobs:
  build-ios:
    # macOS requis pour la chaîne Apple. macos-15 = Sequoia (a Xcode 26).
    # Si Xcode 26 n'est pas trouvé, passe à "macos-26".
    runs-on: macos-15

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # iOS 26 exige le SDK Xcode 26. latest-stable = le plus récent du runner.
      - name: Sélectionner Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      # Flutter 3.44 active SPM par défaut → conflit avec le Podfile CocoaPods.
      # On force CocoaPods (chemin attendu par le projet Xcode).
      - name: Forcer CocoaPods (désactiver Swift Package Manager)
        run: flutter config --no-enable-swift-package-manager

      # Repart d'un état Pods propre → Manifest.lock matchera Podfile.lock.
      - name: Nettoyer l'état Pods
        run: |
          flutter clean
          rm -f ios/Podfile.lock
          rm -rf ios/Pods

      - name: Récupérer les dépendances
        run: flutter pub get

      - name: Build iOS (non signé)
        run: flutter build ios --release --no-codesign

      # flutter produit un Runner.app → on l'empaquette en .ipa pour Sideloadly.
      - name: Empaqueter en .ipa
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -qq -r mkzik.ipa Payload

      - name: Publier l'IPA en artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkzik-ipa
          path: build/ios/iphoneos/mkzik.ipa
          if-no-files-found: error
          retention-days: 14
