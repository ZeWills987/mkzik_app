name: Release Android (AAB signé — Play Store)

# Construit un App Bundle (.aab) SIGNÉ, prêt à téléverser sur la Play Console.
# Déclenché manuellement ou par un commit contenant [play].
# Requiert les secrets GitHub (voir RELEASE.md) :
#   ANDROID_KEYSTORE_BASE64, ANDROID_STORE_PASSWORD,
#   ANDROID_KEY_PASSWORD, ANDROID_KEY_ALIAS, MOBILE_ENV_FILE

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-aab:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[play]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Préparer le fichier .env
        env:
          ENV_FILE: ${{ secrets.MOBILE_ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then printf '%s' "$ENV_FILE" > .env; else touch .env; fi

      - name: Décoder le keystore + générer key.properties
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::Secret ANDROID_KEYSTORE_BASE64 manquant — voir RELEASE.md"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/mkzik-release.jks
          cat > android/key.properties <<EOF
          storeFile=mkzik-release.jks
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          EOF

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Récupérer les dépendances
        run: flutter pub get

      - name: Build App Bundle signé
        run: flutter build appbundle --release

      - name: Publier l'AAB en artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkzik-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
