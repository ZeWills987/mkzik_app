name: Build Android (APK)

# Compile l'APK release et le publie dans une Release GitHub à tag fixe
# (android-latest) → URL de téléchargement stable pour la page index.html.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # lancement manuel possible

permissions:
  contents: write   # requis pour créer/mettre à jour la Release

jobs:
  build-android:
    # Ne se lance que si le message du commit contient [android] ou [build]
    # (ou via "Run workflow" manuel).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[android]') ||
      contains(github.event.head_commit.message, '[build]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet + tags, requis pour les notes de version

      # .env est déclaré comme asset mais pas committé (secret/local).
      # On le recrée depuis le secret ENV_FILE, sinon vide (URLs par défaut).
      - name: Préparer le fichier .env
        env:
          ENV_FILE: ${{ secrets.MOBILE_ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > .env
          else
            touch .env
          fi

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Récupérer les dépendances
        run: flutter pub get

      # --build-number = numéro de run CI → versionCode qui monte à chaque build
      # (le compteur local de version.properties ne persiste pas sur le runner).
      - name: Build APK (release)
        run: flutter build apk --release --build-number=${{ github.run_number }}

      # Notes de version = commits feat/fix/style/refactor depuis le tag précédent.
      - name: Générer les notes de version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | sed -E 's/version: *([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          {
            echo "# Mkzik Android v$VERSION (build ${{ github.run_number }})"
            echo
            bash scripts/release_notes.sh
          } > release_notes.md
          cat release_notes.md

      # Tag fixe "android-latest" → l'URL de l'APK ne change jamais.
      - name: Publier l'APK dans une Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Mkzik Android (dernier build)"
          body_path: release_notes.md
          files: build/app/outputs/flutter-apk/app-release.apk
