name: Build Android (APK)

# Compile l'APK release et le publie dans une Release GitHub à tag fixe
# (android-latest) → URL de téléchargement stable pour la page index.html.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # lancement manuel possible

permissions:
  contents: write   # requis pour créer/mettre à jour la Release

jobs:
  build-android:
    # Ne se lance que si le message du commit contient [android] ou [build]
    # (ou via "Run workflow" manuel).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[android]') ||
      contains(github.event.head_commit.message, '[build]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # .env est déclaré comme asset mais pas committé (secret/local).
      # On le recrée depuis le secret ENV_FILE, sinon vide (URLs par défaut).
      - name: Préparer le fichier .env
        env:
          ENV_FILE: ${{ secrets.MOBILE_ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            printf '%s' "$ENV_FILE" > .env
          else
            touch .env
          fi

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Récupérer les dépendances
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      # Tag fixe "android-latest" → l'URL de l'APK ne change jamais.
      - name: Publier l'APK dans une Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Mkzik Android (dernier build)"
          files: build/app/outputs/flutter-apk/app-release.apk
